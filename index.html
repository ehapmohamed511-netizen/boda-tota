<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة عقد قران: عبد الرحمن & تقي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@400;600;700;850&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-dark: #2c3e50;
            --accent-pink: #b56576;
            --accent-blue: #576f84;
            --gold-subtle: #c5a85c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* شاشة البداية لتشغيل الصوت */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out;
        }

        #welcome-screen button {
            background-color: var(--accent-pink);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.25rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(181, 101, 118, 0.35);
            transition: all 0.3s ease;
        }

        #welcome-screen button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(181, 101, 118, 0.45);
        }

        /* كارت الدعوة الرئيسي بتصميم زجاجي مودرن */
        .invitation-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 45px 25px;
            text-align: center;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            margin: 20px;
            position: relative;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .invitation-card.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* البسملة */
        .basmala {
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            color: var(--gold-subtle);
            margin-bottom: 25px;
        }

        .intro {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 25px;
            letter-spacing: 0.3px;
        }

        /* حاوية الأسماء المودرن */
        .names-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            padding: 20px 10px;
        }

        .name {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.8rem;
            color: var(--accent-pink);
            font-weight: 700;
            line-height: 1.1;
        }

        .divider-glow {
            display: flex;
            align-items: center;
            width: 70%;
            margin: 12px 0;
        }

        .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to left, transparent, var(--gold-subtle), transparent);
        }

        .ring-icon {
            font-size: 1.6rem;
            margin: 0 15px;
            animation: float 3s infinite ease-in-out;
        }

        /* الشعر */
        .poem {
            font-family: 'Amiri', serif;
            font-size: 1.25rem;
            line-height: 1.8;
            color: #4a5568;
            margin-bottom: 35px;
        }

        /* صندوق التفاصيل */
        .details-box {
            background: white;
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 35px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .date-time {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 6px;
        }

        .hotel-name {
            font-size: 1.35rem;
            font-weight: 850;
            color: var(--text-dark);
            margin-top: 8px;
        }

        /* زر الخريطة */
        .location-btn {
            display: inline-block;
            background-color: var(--accent-blue);
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(87, 111, 132, 0.2);
        }

        .location-btn:hover {
            background-color: var(--accent-pink);
            box-shadow: 0 10px 25px rgba(181, 101, 118, 0.3);
            transform: translateY(-2px);
        }

        /* حركة طفو الخواتم اللطيفة */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* بتلات ورد ناعمة جدًا بالخلفية */
        .petal {
            position: fixed;
            background: radial-gradient(circle, rgba(181, 101, 118, 0.2) 0%, rgba(181, 101, 118, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <p style="margin-bottom: 25px; color: var(--accent-blue); font-size: 1.25rem; font-weight: 600; letter-spacing: 0.5px;">تسرنا دعوتكم لـ فرحتنا ✨</p>
        <button onclick="startInvitation()">اضغط لفتح الدعوة ✉️</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/ljzb43.mp3" type="audio/mpeg">
        متصفحك لا يدعم تشغيل الصوت.
    </audio>

    <div class="invitation-card" id="card">
        
        <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        
        <div class="intro">نتشرف بدعوتكم لحضور حفل عقد قران</div>
        
        <div class="names-container">
            <span class="name">عبد الرحمن</span>
            <div class="divider-glow">
                <div class="line"></div>
                <span class="ring-icon">💍</span>
                <div class="line"></div>
            </div>
            <span class="name">تقي</span>
        </div>
        
        <div class="poem">
            لفرحنا اليوم ندعوكم، بالطيب والورد نلاقيكم،<br>
            وبالحب والخير نشكر تهانيكم.
        </div>
        
        <div class="details-box">
            <div class="date-time">الجمعة 17 يوليو 2026</div>
            <div class="date-time" style="font-size: 1rem; font-weight: normal; opacity: 0.8;">من الساعة 3 إلى 6 مساءً</div>
            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.04); margin: 15px 0;">
            <div class="hotel-name">Oro Plaza Hotel</div>
        </div>
        
        <a href="https://www.google.com/maps/search/?api=1&query=30.086605,31.478437" target="_blank" class="location-btn">📍 موقع القاعة على الخريطة</a>

    </div>

    <script>
        function createSoftPetals() {
            for (let i = 0; i < 10; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.left = Math.random() * 100 + 'vw';
                const size = Math.random() * 20 + 15 + 'px';
                petal.style.width = size;
                petal.style.height = size;
                petal.style.animationDelay = Math.random() * 4 + 's';
                petal.style.animationDuration = Math.random() * 5 + 7 + 's';
                document.body.appendChild(petal);
            }
        }

        function startInvitation() {
            const welcomeScreen = document.getElementById('welcome-screen');
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
            }, 800);

            const music = document.getElementById('bg-music');
            music.play().catch(error => {
                console.log("تم حظر التشغيل التلقائي.");
            });

            const card = document.getElementById('card');
            setTimeout(() => {
                card.classList.add('show');
                createSoftPetals();
            }, 200);
        }
    </script>
</body>
</html>
